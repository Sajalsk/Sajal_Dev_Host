services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  api:
    build:
      context: ./api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      CONTACT_TABLE: sajal-portfolio-contacts
      ANALYTICS_TABLE: sajal-portfolio-analytics
      RATE_LIMIT_TABLE: sajal-portfolio-rate-limits
      OWNER_EMAIL: sajalsk247@gmail.com
      FROM_EMAIL: sajalsk247@gmail.com
      ALLOWED_ORIGIN: "*"
      RATE_LIMIT_PER_HOUR: "5"
      SES_MOCK: "true"
    depends_on:
      - redis
      - dynamodb

volumes:
  redis-data:
